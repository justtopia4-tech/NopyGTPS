<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
    
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer rotating ring -->
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#ring1)" stroke-width="2" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="100" r="85" fill="none" stroke="url(#ring2)" stroke-width="1.5" opacity="0.4" stroke-dasharray="10 5">
      <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Hexagonal pattern -->
  <g filter="url(#glow)" opacity="0.8">
    <polygon points="100,40 130,75 115,110 85,110 70,75" fill="none" stroke="#00ffff" stroke-width="2">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="12s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Inner pulsing core -->
  <circle cx="100" cy="100" r="35" fill="url(#coreGlow)" filter="url(#strongGlow)">
    <animate attributeName="r" values="35;38;35" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Central symbol -->
  <g filter="url(#strongGlow)">
    <text x="100" y="115" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#ffffff" opacity="0.95">
      G
      <animate attributeName="opacity" values="0.95;0.7;0.95" dur="1.5s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Orbiting particles -->
  <g>
    <circle cx="100" cy="35" r="4" fill="#00ffff" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="100" r="3" fill="#ff00ff" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="165" r="3.5" fill="#00ff88" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="240 100 100" to="600 100 100" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3.5;5.5;3.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Energy lines -->
  <g opacity="0.6" filter="url(#glow)">
    <line x1="100" y1="65" x2="100" y2="30" stroke="#00ffff" stroke-width="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="135" y1="100" x2="170" y2="100" stroke="#ff00ff" stroke-width="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="135" x2="100" y2="170" stroke="#00ff88" stroke-width="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="65" y1="100" x2="30" y2="100" stroke="#00ffff" stroke-width="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
