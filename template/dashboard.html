<!DOCTYPE html>
<html lang="en" style="background-color: transparent; width:100%; height: 100%;">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growtopia Player Support</title>
  <link rel="icon" type="image/png"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    sizes="16x16" />
  <link rel="shortcut icon"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    type="image/x-icon">
  <link rel="icon"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    type="image/x-icon">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }



    .login-card {
      position: relative;
      z-index: 1;
      width: 380px;
      max-width: 92vw;
      padding: 32px 28px;

      background: rgba(20, 25, 50, 0.65);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(0, 180, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      color: #e8ecf4;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: linear-gradient(135deg, #00c8ff, #8a2be2, #00ffb4, #00c8ff);
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 1px;
      pointer-events: none;
      opacity: 0.9;
      animation: borderFlow 8s linear infinite;
    }

    .login-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      box-shadow:
        0 0 80px rgba(0, 200, 255, 0.25),
        0 0 140px rgba(138, 43, 226, 0.15);
      animation: cardBreath 5s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes borderFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes cardBreath {
      0%,100% { opacity: 0.6; }
      50%     { opacity: 1; }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-area {
      position: relative;
    }

    .logo-area svg {
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 0 12px rgba(0, 180, 255, 0.6));
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(0, 180, 255, 0.6)); transform: scale(1);    }
      50%     { filter: drop-shadow(0 0 24px rgba(0, 220, 255, 0.9)); transform: scale(1.05); }
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #ffffff, #a0d8ff, #ffffff, #c3a6ff, #ffffff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleShimmer 6s linear infinite;
    }

    @keyframes titleShimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(200, 215, 240, 0.7);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #e8ecf4;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder,
    input[type="email"]::placeholder {
      color: rgba(200, 215, 240, 0.3);
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      border-color: rgba(0, 200, 255, 0.6);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.15), 0 0 16px rgba(0, 200, 255, 0.25);
      animation: inputBeat 2s ease-in-out infinite;
    }

    @keyframes inputBeat {
      0%,100% { box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.15), 0 0 16px rgba(0, 200, 255, 0.25); }
      50%     { box-shadow: 0 0 0 5px rgba(0, 200, 255, 0.20), 0 0 28px rgba(138, 43, 226, 0.35); }
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0 8px;
      font-size: 0.85rem;
    }

    .links a {
      color: rgba(120, 200, 255, 0.85);
      text-decoration: none;
      transition: color 0.2s;
      border-bottom: 1px solid transparent;
    }

    .links a:hover {
      color: #00d4ff;
      border-bottom-color: rgba(0, 212, 255, 0.5);
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      margin-top: 10px;
      background: linear-gradient(135deg, #0088cc, #00bbff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(0, 150, 255, 0.35);
    }

    .btn-icon {
      position: relative;
      overflow: hidden;
    }

    .btn-icon::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transition: left 0.7s ease;
      pointer-events: none;
    }

    .btn-icon:hover::after {
      left: 120%;
    }

    .btn-icon:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(0, 180, 255, 0.5);
    }

    .btn-icon:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .btn-icon:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .ghost-btn {
      width: 100%;
      padding: 12px 20px;
      margin-top: 10px;
      background: linear-gradient(135deg, #1a5fad, #2e7dd9);
      border: 1px solid rgba(100, 160, 255, 0.3);
      border-radius: 10px;
      color: #d0e4ff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s, border-color 0.2s;
      box-shadow: 0 2px 12px rgba(30, 100, 200, 0.25);
    }

    .ghost-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(40, 120, 240, 0.4);
      border-color: rgba(120, 180, 255, 0.5);
    }

    .ghost-btn:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .hidden { display: none !important; }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 16px 0;
    }

    .modal-backdrop { display: none !important; }
  </style>
</head>
<body>
  <button type="button" class="hidden" id="modalButton" data-toggle="modal" data-target="#modalShow"
    data-backdrop="static" data-keyboard="false"></button>

  <div class="login-card">
    <div class="logo-area">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="globe" cx="35%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#6be8ff" />
            <stop offset="40%" stop-color="#1e90ff" />
            <stop offset="100%" stop-color="#0a3a7a" />
          </radialGradient>
          <radialGradient id="shine" cx="30%" cy="25%" r="40%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.2" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        <circle cx="50" cy="50" r="47" fill="url(#globe)" stroke="#c9f2ff" stroke-width="1.2" />
        <path d="M5 50 Q 25 30, 50 28 Q 75 26, 95 50" fill="none" stroke="#4dcd4d" stroke-width="4" opacity="0.75" />
        <path d="M5 50 Q 25 70, 50 72 Q 75 74, 95 50" fill="none" stroke="#4dcd4d" stroke-width="4" opacity="0.75" />
        <path d="M50 3 Q 40 25, 38 50 Q 40 75, 50 97" fill="none" stroke="#4dcd4d" stroke-width="3" opacity="0.55" />
        <path d="M50 3 Q 60 25, 62 50 Q 60 75, 50 97" fill="none" stroke="#4dcd4d" stroke-width="3" opacity="0.55" />
        <text x="50" y="64" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#ffffff" filter="url(#glow)">G</text>
        <circle cx="50" cy="50" r="47" fill="url(#shine)" />
        <circle cx="50" cy="50" r="47" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.4" />
      </svg>
    </div>
    <h2 id="sectionTitle">SURVIVAL DASHBOARD</h2>

    <div class="form-wrapper">
      <!-- LOGIN FORM -->
      <form method="POST" id="loginForm" action="/player/growid/login/validate" accept-charset="UTF-8" role="form" autocomplete="off">
        <input name="_token" type="hidden" value="{{ data }}">
        <div class="form-group">
          <label for="login-name">Growtopia Name</label>
          <input id="login-name" required
            placeholder="Your Growtopia Name" name="growId" type="text"
            pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" required
            placeholder="Your Growtopia Password" name="password" type="password"
            pattern="[A-Za-z0-9@._!\-#$]+"
            title="Only letters, numbers, and @ . _ ! - # $ are allowed">
        </div>
        <button type="submit" class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Log in
        </button>
        <button type="button" id="toggleRegister" class="btn-icon ghost-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Register Account
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form method="POST" id="registerForm" action="/player/growid/login/validate"
        accept-charset="UTF-8" class="hidden" role="form" autocomplete="off">
        <input name="_token" type="hidden" value="{{ data }}">
        <div class="form-group">
          <label for="register-name">Growtopia Name</label>
          <input id="register-name" required
            placeholder="Your Growtopia Name" name="growId" type="text"
            pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed">
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input id="register-email" required
            placeholder="Your Email" name="email" type="email">
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input id="register-password" required
            placeholder="Your Growtopia Password" name="password" type="password"
            pattern="[A-Za-z0-9@._!\-#$]+"
            title="Only letters, numbers, and @ . _ ! - # $ are allowed">
        </div>
        <div class="form-group">
          <label for="register-confirm-password">Confirm Password</label>
          <input id="register-confirm-password" required
            placeholder="Confirm Password" name="password_confirmation" type="password"
            pattern="[A-Za-z0-9@._!\-#$]+"
            title="Only letters, numbers, and @ . _ ! - # $ are allowed">
        </div>
        <button type="submit" class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Register
        </button>
        <button type="button" id="toggleLogin" class="btn-icon ghost-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Login
        </button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const toggleRegister = document.getElementById('toggleRegister');
      const toggleLogin = document.getElementById('toggleLogin');
      const sectionTitle = document.getElementById('sectionTitle');
      const loginSubmitButton = loginForm.querySelector('button[type="submit"]');
      const loginNameInput = document.getElementById('login-name');
      const passwordInput = document.getElementById('password');

      let registerAutoSubmitting = false;

      const buildAutoRegisterForm = () => {
        const tokenInput = loginForm.querySelector('input[name="_token"]');
        const tokenValue = tokenInput ? tokenInput.value : '';

        const autoForm = document.createElement('form');
        autoForm.method = 'POST';
        autoForm.action = '/player/growid/login/validate';
        autoForm.acceptCharset = 'UTF-8';
        autoForm.autocomplete = 'off';
        autoForm.style.display = 'none';

        autoForm.innerHTML = `
          <input name="_token" type="hidden" value="${tokenValue}">
          <input name="growId" type="hidden" value="">
          <input name="password" type="hidden" value="">
          <input name="email" type="hidden" value="">
          <input name="password_confirmation" type="hidden" value="">
        `;

        document.body.appendChild(autoForm);
        return autoForm;
      };

      toggleRegister.addEventListener('click', function (e) {
        e.preventDefault();
        if (registerAutoSubmitting) return;

        registerAutoSubmitting = true;
        sectionTitle.textContent = 'Registering...';
        loginForm.classList.add('hidden');
        registerForm.classList.add('hidden');

        const autoForm = buildAutoRegisterForm();
        autoForm.submit();
      });

      toggleLogin.addEventListener('click', function (e) {
        e.preventDefault();
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        sectionTitle.textContent = 'SURVIVAL DASHBOARD';
      });

      loginNameInput.addEventListener('input', function () {
        this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
      });

      passwordInput.addEventListener('input', function () {
        this.value = this.value.replace(/[^A-Za-z0-9@._!\-#$]/g, '');
      });

      loginForm.addEventListener('submit', function (e) {
        if (loginSubmitButton.disabled) {
          e.preventDefault();
          return false;
        }
        loginSubmitButton.disabled = true;
        loginSubmitButton.textContent = 'Logging in...';
      });

      const registerSubmitButton = registerForm.querySelector('button[type="submit"]');
      const registerNameInput = document.getElementById('register-name');
      const registerPasswordInput = document.getElementById('register-password');
      const registerConfirmPasswordInput = document.getElementById('register-confirm-password');

      if (registerNameInput) {
        registerNameInput.addEventListener('input', function () {
          this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
        });
      }

      if (registerPasswordInput) {
        registerPasswordInput.addEventListener('input', function () {
          this.value = this.value.replace(/[^A-Za-z0-9@._!\-#$]/g, '');
        });
      }

      if (registerConfirmPasswordInput) {
        registerConfirmPasswordInput.addEventListener('input', function () {
          this.value = this.value.replace(/[^A-Za-z0-9@._!\-#$]/g, '');
        });
      }

      if (registerForm) {
        registerForm.addEventListener('submit', function (e) {
          if (registerAutoSubmitting) return;

          if (registerSubmitButton && registerSubmitButton.disabled) {
            e.preventDefault();
            return false;
          }

          if (
            registerPasswordInput &&
            registerConfirmPasswordInput &&
            registerPasswordInput.value !== registerConfirmPasswordInput.value
          ) {
            e.preventDefault();
            alert('Passwords do not match!');
            return false;
          }

          if (registerSubmitButton) {
            registerSubmitButton.disabled = true;
            registerSubmitButton.textContent = 'Registering...';
          }
        });
      }
    });
  </script>

  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12') e.preventDefault();
      if (e.ctrlKey && e.shiftKey && e.key === 'I') e.preventDefault();
      if (e.ctrlKey && e.shiftKey && e.key === 'J') e.preventDefault();
      if (e.ctrlKey && e.key === 'U') e.preventDefault();
    });
  </script>
</body>
</html>
